const VIGNETTES = [
  { number:1, cluster:"Heparin-Induced Thrombocytopenia (HIT)", objectives_tested:["LO2: Heparin-derived anticoagulants — HIT pathophysiology and management"], vignette:"A 67-year-old woman underwent total hip replacement 8 days ago and has been on unfractionated heparin prophylaxis since surgery. Today, her platelet count is 89,000/μL, down from 210,000/μL on admission. She is noted to have new swelling and pain in her left calf. Duplex ultrasound confirms a new DVT. Her temperature is 37.8°C. She has no other obvious causes of thrombocytopenia.", question:"Which of the following is the most appropriate immediate management for this patient?", answer:"Stop all heparin immediately and initiate a non-heparin anticoagulant such as argatroban (direct thrombin inhibitor) for treatment of the new DVT.", why_correct:"This patient has HIT Type II: platelet drop ≥50% from baseline on days 5–14 of heparin, with new paradoxical thrombosis (DVT). HIT is an immune-mediated condition (IgG against heparin-PF4 complex) causing platelet activation → thrombosis despite low platelet count. All heparin must be stopped. Argatroban (direct thrombin inhibitor, not heparin-derived) is the appropriate alternative.", key_clues:"Day 8 of heparin + platelet drop 50%+ + new thrombosis = classic HIT. Paradoxical thrombosis with thrombocytopenia is the hallmark.", why_missed:"Students may want to increase anticoagulation with more heparin (wrong — heparin is causing the problem) or give platelet transfusions (wrong — can worsen thrombosis in HIT).", trap:"Do NOT transfuse platelets in HIT. Do NOT switch to warfarin acutely (protein C/S depletion → skin necrosis/paradoxical thrombosis). The only correct move is heparin cessation + direct thrombin inhibitor." },
  { number:2, cluster:"Warfarin Drug Interaction", objectives_tested:["LO2: Vitamin K antagonists — drug interactions and INR management"], vignette:"A 72-year-old man with non-valvular atrial fibrillation has been stable on warfarin with INR values consistently between 2.2 and 2.8 for 18 months. He is started on amiodarone for recurrent symptomatic Afib. Three weeks later, he presents with gross hematuria and his INR is 7.4. His warfarin dose has not been changed.", question:"Which of the following best explains this patient's supratherapeutic INR?", answer:"Amiodarone inhibits CYP2C9, which is responsible for warfarin (S-warfarin) metabolism, leading to decreased warfarin clearance and elevated plasma levels → ↑ anticoagulant effect → ↑ INR.", why_correct:"S-warfarin (the more potent enantiomer) is metabolized by CYP2C9. Amiodarone is a potent CYP2C9 inhibitor → ↑ warfarin levels → supratherapeutic INR. Additionally, amiodarone inhibits CYP2C9 even after stopping the drug (long t½ of amiodarone — months).", key_clues:"New amiodarone + previously stable warfarin + INR rise = CYP2C9 inhibition. Classic interaction. Management: hold warfarin, give vitamin K for serious bleeding, reduce warfarin dose on restart.", why_missed:"Students may attribute the INR rise to dietary changes or other factors without recognizing the amiodarone-CYP2C9 interaction. Amiodarone's effect on warfarin can persist for months after stopping.", trap:"Amiodarone's long half-life (40–55 days) means its CYP2C9 inhibitory effect persists for months — anticipate needing to reduce warfarin dose for a prolonged period after starting amiodarone." },
  { number:3, cluster:"tPA in Acute Ischemic Stroke", objectives_tested:["LO2: Fibrinolytic agents — indications, contraindications, and timing for tPA"], vignette:"A 58-year-old right-handed man is brought to the ED with sudden onset right-sided weakness and expressive aphasia that began 2 hours ago. He has a history of hypertension (BP today 168/94 mmHg), type 2 diabetes, and no prior strokes. Non-contrast CT head shows no hemorrhage and no early ischemic changes. His blood glucose is 112 mg/dL. INR is 1.0. He takes aspirin 81 mg daily.", question:"Which of the following is the most appropriate next step in management?", answer:"Administer IV alteplase (tPA) — the patient meets criteria: acute ischemic stroke confirmed (CT negative for hemorrhage), within 4.5-hour window, BP <185/110, no absolute contraindications.", why_correct:"The patient has acute ischemic stroke with symptom onset 2 hours ago (within 4.5-hr window). CT excludes hemorrhagic stroke. BP is 168/94 (acceptable — can treat to <185/110 before tPA). No absolute contraindications. IV alteplase activates plasminogen → plasmin → dissolves fibrin clot → restores cerebral perfusion.", key_clues:"Ischemic stroke + <4.5 hrs + CT negative for hemorrhage + BP <185/110 + INR normal = tPA eligible. Aspirin must be held for 24 hours after tPA.", why_missed:"Students may hesitate because the patient is already on aspirin or because of his HTN — BP 168/94 is acceptable for tPA (threshold is 185/110). Daily aspirin use is NOT a contraindication to tPA.", trap:"The BP threshold for tPA in stroke is 185/110 (not 140/90). Aspirin is held 24 hours after tPA, not given with it. Always rule out hemorrhagic stroke by CT before tPA." },
];

const QUESTIONS = [
  { number:1, cluster:"HIT Management", objectives_tested:["LO2: Heparin-derived anticoagulants — HIT Type II"], stem:"A 55-year-old man is hospitalized for community-acquired pneumonia and receives prophylactic unfractionated heparin. On hospital day 9, his platelet count drops from 240,000 to 95,000/μL. He develops a new right arm DVT confirmed by ultrasound. Which of the following is the most appropriate next step?", choices:{ A:"Increase heparin dose to provide therapeutic anticoagulation for the DVT", B:"Switch to enoxaparin (LMWH) to treat the DVT", C:"Administer platelet transfusion to address thrombocytopenia", D:"Discontinue heparin and initiate argatroban", E:"Start warfarin immediately and stop heparin" }, correct:"D", tested_concept:"HIT: stop all heparin, switch to non-heparin anticoagulant (argatroban or bivalirudin)", why_correct:"This is classic HIT Type II: platelet drop ≥50% on day 9 of heparin with paradoxical thrombosis. Heparin must be stopped immediately. Argatroban (direct thrombin inhibitor, not heparin-derived) is the appropriate replacement for anticoagulation.", why_wrong:{ A:"Increasing heparin will worsen HIT — the heparin is causing the immune reaction", B:"LMWH is also heparin-derived and cross-reacts with HIT antibodies — contraindicated", C:"Platelet transfusions can worsen thrombosis in HIT by providing more substrate for antibody-activated aggregation", E:"Starting warfarin acutely in HIT causes skin necrosis/warfarin necrosis by depleting protein C first before other factors — must bridge with argatroban first" }, trap:"LMWH is NOT safe in HIT — HIT antibodies cross-react with LMWH. Only truly non-heparin anticoagulants (argatroban, bivalirudin, fondaparinux) are safe." },
  { number:2, cluster:"Warfarin vs. DOAC Selection", objectives_tested:["LO2: Vitamin K antagonists vs. direct thrombin inhibitors — appropriate drug selection"], stem:"A 68-year-old woman with non-valvular atrial fibrillation and a mechanical mitral valve replacement (placed 3 years ago) presents for anticoagulation management. She asks if she can switch from warfarin to apixaban because she has difficulty maintaining therapeutic INR. Which of the following is the most appropriate response?", choices:{ A:"Switch to apixaban — it provides equivalent stroke protection with less monitoring burden", B:"Switch to dabigatran — it has shown superior outcomes in mechanical valve patients", C:"Continue warfarin — DOACs are contraindicated in patients with mechanical heart valves", D:"Switch to rivaroxaban — it is the only DOAC approved for mechanical valves", E:"Discontinue anticoagulation — her mechanical valve makes anticoagulation too risky" }, correct:"C", tested_concept:"Mechanical heart valves require warfarin — DOACs are contraindicated", why_correct:"All DOACs are contraindicated in patients with mechanical heart valves. The RE-ALIGN trial (2013) tested dabigatran in mechanical valve patients and was stopped early due to excess thromboembolic events and bleeding. Warfarin remains the ONLY approved anticoagulant for mechanical heart valves.", why_wrong:{ A:"Apixaban is NOT approved for mechanical valves — contraindicated", B:"Dabigatran was specifically tested and shown to be INFERIOR (more thromboembolism and bleeding) in mechanical valve patients in the RE-ALIGN trial", D:"No DOAC is approved for mechanical valves", E:"Anticoagulation is mandatory for mechanical heart valves — the risk of valve thrombosis without it is life-threatening" }, trap:"This is a high-yield distinction: DOACs = fine for non-valvular Afib, DVT/PE. Mechanical heart valves = warfarin ONLY. The RE-ALIGN trial is the key evidence." },
  { number:3, cluster:"tPA Contraindications", objectives_tested:["LO2: Fibrinolytic agents — contraindications to tPA in stroke"], stem:"A 75-year-old woman presents with acute onset left hemiplegia and hemineglect. Her last known well time was 5.5 hours ago. Non-contrast CT head shows no hemorrhage. Her BP is 172/96 mmHg, INR 1.1, and blood glucose is 140 mg/dL. Her past medical history includes a hemorrhagic stroke 8 months ago. Which of the following is the most appropriate management?", choices:{ A:"Administer IV alteplase immediately — CT is negative for hemorrhage", B:"Lower BP to <140/90, then administer IV alteplase", C:"IV alteplase is contraindicated — administer aspirin and arrange urgent neurology consultation", D:"Administer IV alteplase within 3 hours only — 5.5 hours is within range for tenecteplase", E:"Administer systemic heparin as an alternative to thrombolytics" }, correct:"C", tested_concept:"Contraindications to tPA: prior hemorrhagic stroke + symptom duration >4.5 hours both present", why_correct:"This patient has TWO absolute contraindications to IV tPA: (1) prior intracranial hemorrhage (8 months ago) — history of hemorrhagic stroke is an absolute contraindication regardless of timing, and (2) last known well time of 5.5 hours exceeds the 4.5-hour window for tPA. Aspirin and urgent neurology consultation are appropriate.", why_wrong:{ A:"CT negative for hemorrhage addresses current hemorrhage but prior hemorrhagic stroke is still a contraindication", B:"BP 172/96 is acceptable for tPA (threshold is 185/110), but the other contraindications remain", D:"The 4.5-hour window has passed, and prior hemorrhagic stroke is still a contraindication regardless of agent", E:"Systemic heparin is not an alternative to tPA in acute ischemic stroke" }, trap:"Two separate contraindications here — students may only catch one. Know both: (1) prior intracranial hemorrhage = absolute contraindication. (2) >4.5 hours from last known well = outside window." },
  { number:4, cluster:"Clopidogrel Pharmacogenomics", objectives_tested:["LO2: Antiplatelet therapies — clopidogrel prodrug activation and genetic resistance"], stem:"A 54-year-old man with known coronary artery disease undergoes coronary stent placement for NSTEMI. He is started on dual antiplatelet therapy with aspirin and clopidogrel. Six months later, he suffers in-stent thrombosis. Pharmacogenomic testing reveals he is a CYP2C19 poor metabolizer. Which of the following best explains his in-stent thrombosis?", choices:{ A:"Aspirin irreversibly inhibits COX-2, reducing clopidogrel's effectiveness", B:"Poor CYP2C19 metabolizers cannot adequately convert clopidogrel to its active metabolite, resulting in insufficient P2Y12 inhibition", C:"Clopidogrel competitively inhibits CYP2C19, reducing its own activation over time", D:"CYP2C19 poor metabolizers have increased platelet sensitivity to ADP", E:"Poor metabolizers absorb clopidogrel more rapidly, leading to peak-and-trough effect" }, correct:"B", tested_concept:"Clopidogrel is a prodrug requiring CYP2C19 activation; poor metabolizers have reduced platelet inhibition → increased thrombotic risk", why_correct:"Clopidogrel is a prodrug that requires hepatic CYP2C19 activation to form its active metabolite, which then irreversibly blocks P2Y12. CYP2C19 poor metabolizers (15% of Caucasians, 30% of Asians) produce insufficient active metabolite → inadequate platelet inhibition → increased stent thrombosis risk. Ticagrelor is the preferred alternative (direct-acting, no prodrug activation).", why_wrong:{ A:"Aspirin inhibits COX-1/COX-2 but does not affect clopidogrel's metabolism or activation", C:"Clopidogrel does not inhibit CYP2C19 — it is a substrate, not an inhibitor", D:"ADP sensitivity is not altered by CYP2C19 status", E:"Absorption is not the issue — activation by CYP2C19 is the rate-limiting step" }, trap:"The FDA issued a black box warning for clopidogrel regarding CYP2C19 poor metabolizers. Ticagrelor avoids this issue — it is direct-acting and does not require metabolic activation." },
  { number:5, cluster:"Anticoagulant Selection: Renal Failure", objectives_tested:["LO2: Heparin-derived anticoagulants — renal dosing considerations"], stem:"A 70-year-old man with a history of atrial fibrillation (non-valvular) and stage 4 CKD (GFR 22 mL/min) presents with a new DVT. He is currently not on anticoagulation. Which of the following anticoagulation strategies is most appropriate for acute management?", choices:{ A:"Enoxaparin (LMWH) at standard dosing", B:"Rivaroxaban at standard dosing", C:"Unfractionated heparin infusion titrated to aPTT", D:"Warfarin started immediately with no bridging", E:"Dabigatran at standard dosing" }, correct:"C", tested_concept:"Severe CKD: UFH preferred over LMWH and DOACs — UFH is not renally cleared", why_correct:"In severe renal failure (GFR <30), renally cleared anticoagulants accumulate and increase bleeding risk. UFH is primarily cleared by the reticuloendothelial system (not renally) → safe and predictable in renal failure. Monitored by aPTT.", why_wrong:{ A:"Enoxaparin (LMWH) is renally cleared — accumulates in CKD → bleeding risk. Contraindicated in GFR <30.", B:"Rivaroxaban is a Xa inhibitor with significant renal clearance — dose reduction or avoidance required in severe CKD", D:"Starting warfarin without bridging is inappropriate — warfarin takes 2–5 days to reach therapeutic levels, leaving the patient unprotected; bridging with UFH/LMWH is needed", E:"Dabigatran has ~80% renal clearance — most affected by CKD; contraindicated in severe renal failure" }, trap:"All DOACs are renally cleared to varying degrees. UFH is the safest option in severe CKD. Among DOACs, apixaban has the least renal clearance (27%) but is still not preferred in GFR <15–25." },
];

  { title:"Coagulation Cascade & Drug Targets", type:"pathway", objectives:["LO1, LO2 — Hemostasis pathways and therapeutic intervention points"], content:`INTRINSIC PATHWAY          EXTRINSIC PATHWAY\nXII → XI → IX ─────────────── VII (activated by tissue factor)\n                 ↘           ↙\n                  X ← Xa inhibitors BLOCK here\n                  ↓    (apixaban, rivaroxaban, edoxaban)\n               Prothrombin (II)\n                  ↓    Direct thrombin inhibitors BLOCK here\n               Thrombin (IIa) ← (dabigatran, argatroban, bivalirudin)\n                  ↓\n               Fibrinogen → Fibrin → CLOT\n                                      ↑\n                               tPA → plasmin → dissolves fibrin\n\nHEPARIN: activates AT-III → inactivates IIa + Xa (+ IXa)\nWARFARIN: inhibits VKOR → ↓ activation of II, VII, IX, X\nASPIRIN: irreversible COX-1 → ↓ TXA₂ → ↓ platelet aggregation\nP2Y12 inhibitors: block ADP receptor → ↓ platelet aggregation` },

function AnglesTab() {
  return ANGLES.map((c,i) => (
    <Card key={i}>
      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Cluster ${c.number}`} color="purple"/>
        <span style={{ fontWeight:500, fontSize:15 }}>{c.theme}</span>
      </div>
      {c.objectives.map((o,j) => <p key={j} style={{ margin:"0 0 2px", fontSize:13, color:"var(--color-text-secondary)", paddingLeft:10, borderLeft:"2px solid #AFA9EC" }}>{o}</p>)}
      <Lbl t="Core mechanism"/><p style={{ fontSize:13, margin:"0 0 4px" }}>{c.mechanism}</p>
      <p style={{ fontSize:12, color:"var(--color-text-secondary)", fontStyle:"italic", margin:"0 0 10px" }}>{c.why_testable}</p>
      {c.angles.map((a,j) => (
        <Inset key={j}>
          <p style={{ fontWeight:500, fontSize:14, margin:"0 0 6px" }}>Angle {j+1}: {a.title}</p>
          {[["Tested concept",a.tested_concept],["Vignette pattern",a.vignette_pattern],["Key clues",a.key_clues],["Common trap",a.trap],["Disciplines",a.disciplines]].map(([l,v]) =>
            v ? <div key={l}><Lbl t={l}/><p style={{ fontSize:13, margin:"0 0 4px" }}>{v}</p></div> : null
          )}
        </Inset>
      ))}
    </Card>
  ));
}

function VignettesTab() {

        <Pill text={`Vignette ${v.number}`} color="blue"/><Pill text={v.cluster} color="purple"/>
      </div>
      <Inset><p style={{ fontSize:13, lineHeight:1.7, margin:"0 0 8px" }}>{v.vignette}</p><p style={{ fontSize:14, fontWeight:500, margin:0 }}>{v.question}</p></Inset>
      <button onClick={()=>setOpen(o=>({...o,[i]:!o[i]}))} style={{ marginTop:10, fontSize:13, padding:"6px 14px", cursor:"pointer", borderRadius:6, background:"transparent", border:"0.5px solid var(--color-border-secondary)", color:"var(--color-text-primary)" }}>

function QuestionsTab() {
  const [sel, setSel] = useState({});
  const [shown, setShown] = useState({});
  return QUESTIONS.map((q,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Q${q.number}`} color="amber"/><Pill text={q.cluster} color="amber"/>
      </div>
      <p style={{ fontSize:14, lineHeight:1.7, margin:"10px 0" }}>{q.stem}</p>
      {Object.entries(q.choices).map(([letter,txt]) => {
        const picked=sel[i]===letter, revealed=shown[i], isCorrect=letter===q.correct;
        let bg="var(--color-background-secondary)", border="0.5px solid var(--color-border-tertiary)";
        if(!revealed&&picked){bg=T.blue.bg;border=`0.5px solid ${T.blue.bdr}`;}
        if(revealed&&isCorrect){bg=T.green.bg;border=`0.5px solid ${T.green.bdr}`;}
        if(revealed&&picked&&!isCorrect){bg=T.red.bg;border=`0.5px solid ${T.red.bdr}`;}
        return <div key={letter} onClick={()=>!revealed&&setSel(s=>({...s,[i]:letter}))} style={{ background:bg, border, borderRadius:8, padding:"8px 12px", marginBottom:4, cursor:revealed?"default":"pointer", display:"flex", gap:10 }}>
          <span style={{ fontWeight:500, fontSize:13, minWidth:16 }}>{letter}.</span>
          <span style={{ fontSize:13 }}>{txt}</span>
        </div>;
      })}
      <button disabled={!sel[i]||shown[i]} onClick={()=>setShown(s=>({...s,[i]:true}))} style={{ marginTop:6, padding:"6px 14px", borderRadius:6, fontSize:13, cursor:sel[i]&&!shown[i]?"pointer":"default", background:sel[i]&&!shown[i]?T.blue.bg:"var(--color-background-secondary)", color:sel[i]&&!shown[i]?T.blue.txt:"var(--color-text-tertiary)", border:`0.5px solid ${sel[i]&&!shown[i]?T.blue.bdr:"var(--color-border-tertiary)"}` }}>
        Submit answer
      </button>
      {shown[i] && (
        <div style={{ marginTop:8 }}>
          <div style={{ background:T.green.bg, borderRadius:8, padding:"8px 12px", marginBottom:6 }}>
            <Lbl t="Correct answer"/>
            <p style={{ fontSize:13, fontWeight:500, color:T.green.txt, margin:"0 0 2px" }}>{q.correct} — {q.tested_concept}</p>
            <p style={{ fontSize:13, color:T.green.txt, margin:0 }}>{q.why_correct}</p>
          </div>
          {Object.entries(q.why_wrong).map(([l,e]) => <p key={l} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px" }}><strong>{l}:</strong> {e}</p>)}
          <div style={{ background:T.coral.bg, borderRadius:8, padding:"8px 12px", marginTop:6 }}>
            <Lbl t="Main trap"/><p style={{ fontSize:13, color:T.coral.txt, margin:0 }}>{q.trap}</p>
          </div>
        </div>
      )}
    </Card>
  ));
}

          <p style={{ fontSize:15, fontWeight:500, margin:0 }}>🩸 Anticoagulants / Antiplatelets</p>
          <p style={{ fontSize:11, color:"var(--color-text-secondary)", margin:0 }}>Georgetown SOM · Cardio Exam 2</p>
        </div>
      </div>
      <div style={{ display:"flex", gap:4, overflowX:"auto", paddingBottom:6, marginBottom:12 }}>
        {STUDY_TABS.map(t => {
          const active=activeTab===t.id;
          return <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flexShrink:0, padding:"5px 12px", borderRadius:8, border:active?`1px solid ${T.purple.bdr}`:"0.5px solid var(--color-border-tertiary)", background:active?T.purple.bg:"transparent", color:active?T.purple.txt:"var(--color-text-secondary)", fontSize:12, fontWeight:active?500:400, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:13 }}>{t.icon}</span>{t.label}
          </button>;
        })}
      </div>
      <Comp/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
